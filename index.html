>`; openModal(); };
                window.saveDailyEval = async (empId) => { const dateVal = $('eval-date').value; const prod = parseInt($('ev-prod').value) || 0; const qual = parseInt($('ev-qual').value) || 0; const eff = parseInt($('ev-eff').value) || 0; const task = parseInt($('ev-task').value) || 0; if(!dateVal) return showToast("اختر التاريخ", "error"); const totalScore = prod + qual + eff + task; const user = USERS_CONFIG.find(u => u.id === empId); await addDoc(collection(db, `artifacts/${APP_ID}/public/data/daily_evaluations`), { employeeId: empId, employeeName: user.displayName, date: new Date(dateVal), productivity: prod, quality: qual, efficiency: eff, taskCompletion: task, totalScore, createdAt: new Date() }); showToast("تم حفظ التقييم اليومي"); closeModal(); };
                window.openDayModal = (dateStr) => { const date = new Date(dateStr); const absent = leaves.filter(l => { if(l.status !== 'Approved') return false; const start = new Date(l.startDate); const end = new Date(l.endDate); return date >= start && date <= end; }); const externalCount = externalWorkers[dateStr] || 0; $('modal-content').innerHTML = `<div class="border-b border-gray-200 pb-3 mb-3 flex justify-between items-center"><h3 class="font-bold text-lg text-gray-800">${formatDate(date)}</h3><span onclick="closeModal()" class="text-gray-400 cursor-pointer hover:text-red-500 text-2xl leading-none">&times;</span></div><div class="mb-6 bg-purple-50 p-4 rounded-xl border border-purple-100"><label class="text-xs text-purple-700 block mb-2 font-bold">عدد العمالة الخارجية</label><div class="flex gap-2"><input type="number" id="ext-workers-input" value="${externalCount}" class="flex-1 border-white bg-white p-3 text-center font-bold text-lg" min="0"><button onclick="saveExternalWorkers('${dateStr}')" class="bg-purple-500 text-white px-4 rounded-xl font-bold text-sm">حفظ</button></div></div><div><h4 class="font-bold text-sm text-gray-700 mb-2">الموظفون الغائبون (${absent.length})</h4>${absent.length === 0 ? '<p class="text-green-500 text-xs bg-green-50 p-2 rounded text-center">الجميع حاضر</p>' : `<div class="space-y-1">${absent.map(l => `<div class="text-xs bg-red-50 text-red-600 p-2 rounded">${l.employeeName} <span class="text-red-300">(${l.type})</span></div>`).join('')}</div>`}</div>`; openModal(); };
                window.openExternalModal = (dateStr) => { const date = new Date(dateStr); const externalCount = externalWorkers[dateStr] || 0; $('modal-content').innerHTML = `<div class="border-b border-gray-200 pb-3 mb-3 flex justify-between items-center"><h3 class="font-bold text-lg text-gray-800">تعديل القوى العاملة</h3><span onclick="closeModal()" class="text-gray-400 cursor-pointer hover:text-red-500 text-2xl leading-none">&times;</span></div><p class="text-sm text-gray-500 mb-4 bg-gray-50 p-2 rounded-lg">${formatDate(date)}</p><div class="mb-6 bg-purple-50 p-4 rounded-xl border border-purple-100 text-center"><label class="text-xs text-purple-700 block mb-2 font-bold">عدد العمالة الخارجية</label><input type="number" id="ext-input-quick" value="${externalCount}" class="w-full border-white bg-white p-3 text-center font-bold text-2xl" min="0" placeholder="0"></div><button onclick="saveExternalWorkersQuick('${dateStr}')" class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold shadow-md">تأكيد</button>`; openModal(); };
                window.saveExternalWorkersQuick = async (dateStr) => { const val = parseInt($('ext-input-quick').value) || 0; const ref = doc(db, `artifacts/${APP_ID}/public/data/external_workers`, dateStr); if(val > 0) { await setDoc(ref, { count: val, date: new Date(dateStr) }); } else { await deleteDoc(ref); } showToast("تم الحفظ"); closeModal(); };
                window.saveExternalWorkers = async (dateStr) => { const val = parseInt($('ext-workers-input').value) || 0; const ref = doc(db, `artifacts/${APP_ID}/public/data/external_workers`, dateStr); if(val > 0) { await setDoc(ref, { count: val, date: new Date(dateStr) }); } else { await deleteDoc(ref); } showToast("تم الحفظ"); closeModal(); };
                
                // --- Balance Modal with Warning Logic ---
                window.openEditBalanceModal = (empId) => { 
                    const data = employeesData[empId] || { totalBalance: 0, usedBalance: 0, remainingBalance: 0 }; 
                    const user = USERS_CONFIG.find(u => u.id === empId); 
                    $('modal-content').innerHTML = `
                        <div class="border-b pb-3 mb-3 flex justify-between items-center">
                            <h3 class="font-bold text-lg">إدارة الرصيد</h3>
                            <span onclick="closeModal()" class="text-gray-400 text-2xl">&times;</span>
                        </div>
                        <p class="text-sm mb-4 bg-gray-50 p-2 rounded">${user.displayName}</p>
                        <div class="space-y-4">
                            <div class="bg-green-50 p-3 rounded-xl border border-green-100">
                                <label class="text-xs text-green-700 block mb-1 font-bold">إجمالي الرصيد المستحق</label>
                                <input type="number" id="edit-total" value="${data.totalBalance || 0}" class="w-full border-white bg-white p-3 text-center font-bold text-lg" min="0">
                            </div>
                            <div class="bg-gray-100 p-3 rounded-xl border border-gray-200">
                                <label class="text-xs text-gray-500 block mb-1">مستهلك</label>
                                <input type="number" value="${data.usedBalance || 0}" class="w-full border-white bg-gray-200 p-3 text-center font-bold text-lg text-gray-500" disabled>
                            </div>
                            <div class="bg-teal-50 p-3 rounded-xl border border-teal-100">
                                <label class="text-xs text-teal-700 block mb-1 font-bold">المتبقي</label>
                                <input type="number" value="${data.remainingBalance || 0}" class="w-full border-white bg-teal-100 p-3 text-center font-bold text-lg text-teal-600" disabled>
                            </div>
                            <button onclick="saveBalance('${empId}')" class="w-full btn-primary py-2 rounded-xl font-bold">حفظ التعديلات</button>
                        </div>
                    `; 
                    openModal(); 
                };
                
                window.saveBalance = async (empId) => { 
                    const newTotal = parseInt($('edit-total').value) || 0; 
                    const currentData = employeesData[empId] || {};
                    const used = currentData.usedBalance || 0;
                    const newRemaining = newTotal - used;
                    
                    const user = USERS_CONFIG.find(u => u.id === empId); 
                    await setDoc(doc(db, `artifacts/${APP_ID}/public/data/employees`, empId), { 
                        totalBalance: newTotal, 
                        usedBalance: used, 
                        remainingBalance: newRemaining 
                    }, { merge: true }); 
                    
                    const msgBody = `تم تحديث رصيدك. إجمالي: ${newTotal} يوم، ومتبقي: ${newRemaining} يوم.`;
                    await createNotification(empId, 'تحديث الرصيد', msgBody, 'emp-balance');
                    
                    if (newTotal >= MAX_LEAVE_BALANCE) {
                        showToast(`تنبيه: إجمالي رصيد الموظف وصل للحد الأقصى (${MAX_LEAVE_BALANCE} يوم)!`, 'warning');
                    } else {
                        showToast("تم حفظ التعديلات");
                    }

                    await logTx(empId, user.displayName, 'adjustment', { days: newTotal }, 'تعديل الرصيد المستحق'); 
                    closeModal(); 
                };
            }
        }
        
        // --- Action Handlers ---
        window.deleteSingleLog = async (id) => { if(!confirm("تأكيد الحذف؟")) return; await deleteDoc(doc(db, `artifacts/${APP_ID}/public/data/balance_logs`, id)); showToast("تم الحذف"); };
        window.applyHistoryFilter = (val) => { currentHistoryFilter = val; updateContent(); };
        window.completeTask = async (id) => { const ref = doc(db, `artifacts/${APP_ID}/public/data/tasks`, id); const snap = await getDoc(ref); const data = snap.data(); if (data.assigneeId === 'all') { const completed = data.completedBy || []; if (!completed.some(c => c.id === currentUser.id)) { await updateDoc(ref, { completedBy: [...completed, { id: currentUser.id, name: currentUser.displayName }] }); } } else { await updateDoc(ref, { completed: true }); } showToast("تم إنجاز المهمة"); };
        
        // --- Leave Handler ---
        window.handleLeave = async (id, status, totalHours, leaveType, empId) => { 
            const ref = doc(db, `artifacts/${APP_ID}/public/data/leaves`, id); 
            const snap = await getDoc(ref); 
            const data = snap.data(); 
            
            if (status === 'Approved') { 
                if (leaveType !== 'مرضية') { 
                    const empData = employeesData[empId] || { totalBalance: 0, usedBalance: 0, remainingBalance: 0 }; 
                    
                    const daysToDeduct = calcDur(data.startDate, data.endDate).days;
                    
                    const newUsed = (empData.usedBalance || 0) + daysToDeduct;
                    const newRemaining = empData.totalBalance - newUsed;
                    
                    await setDoc(doc(db, `artifacts/${APP_ID}/public/data/employees`, empId), { 
                        usedBalance: newUsed, 
                        remainingBalance: newRemaining 
                    }, { merge: true }); 
                    
                    await logTx(empId, data.employeeName, 'deduction', { days: daysToDeduct, hours: 0 }, `إجازة ${data.type}`); 
                } else {
                    const dur = calcDur(data.startDate, data.endDate); 
                    await logTx(empId, data.employeeName, 'info', { days: dur.days, hours: 0 }, `إجازة مرضية (بدون خصم)`); 
                }
            } 
            
            const msg = status === 'Approved' ? 'تم قبول طلب إجازتك' : 'تم رفض طلب إجازتك'; 
            await createNotification(empId, msg, `الطلب: ${data.type}`, 'leaves'); 
            await updateDoc(ref, { status }); 
            showToast(`تم ${status === 'Approved' ? 'القبول' : 'الرفض'}`); 
        };
        
        window.handleOvertime = async (id, status, empId) => { const ref = doc(db, `artifacts/${APP_ID}/public/data/overtime`, id); await updateDoc(ref, { status }); const msg = status === 'Approved' ? 'تم اعتماد الطلب' : 'تم رفض الطلب'; await createNotification(empId, msg, `الحالة: ${status}`, 'overtime'); showToast(msg); };
        window.addNewTask = async (e) => { e.preventDefault(); const desc = $('mgr-task-desc').value; const assigneeId = $('mgr-task-assignee').value; if(!assigneeId) return showToast("اختر موظف", "error"); const assigneeName = assigneeId === 'all' ? 'الجميع' : USERS_CONFIG.find(u => u.id === assigneeId).displayName; await addDoc(collection(db, `artifacts/${APP_ID}/public/data/tasks`), { description: desc, assigneeId, assigneeName, completed: false, completedBy: [], createdAt: new Date() }); $('mgr-task-desc').value = ''; $('mgr-task-assignee').value = ''; showToast("تمت الإضافة"); };
        window.triggerDelete = async (colName) => { const messages = { tasks: 'المهام', leaves: 'الإجازات', overtime: 'الوقت الإضافي', balance_logs: 'سجل الأرصدة' }; const msg = messages[colName]; if(!confirm(`تأكيد حذف (${msg})؟`)) return; await deleteCollection(colName, false); showToast(`تم الحذف`); };
        async function deleteCollection(colName, confirmNeeded = true) { if (confirmNeeded) return; const ref = collection(db, `artifacts/${APP_ID}/public/data/${colName}`); const snap = await getDocs(ref); const batch = writeBatch(db); snap.docs.forEach((d) => { batch.delete(d.ref); }); await batch.commit(); }
        
        // --- Forms ---
        window.openLeaveModal = () => { compressedImageData = null; $('modal-content').innerHTML = `<div class="border-b pb-3 mb-3 flex justify-between items-center"><h3 class="font-bold text-lg">طلب إجازة</h3><span onclick="closeModal()" class="text-gray-400 text-2xl">&times;</span></div><form id="leave-form" class="space-y-3" onsubmit="submitLeave(event)"><div class="grid grid-cols-2 gap-3"><div><label class="text-xs block mb-1">من تاريخ</label><input type="date" id="l-start" class="w-full p-2.5 text-sm" required></div><div><label class="text-xs block mb-1">إلى تاريخ</label><input type="date" id="l-end" class="w-full p-2.5 text-sm" required></div></div><div><label class="text-xs block mb-1">نوع الإجازة</label><select id="l-type" class="w-full p-2.5 text-sm bg-white" required><option value="اعتيادية">اعتيادية</option><option value="مرضية">مرضية</option><option value="طارئة">طارئة</option></select></div><div><label class="text-xs block mb-1">ملاحظات</label><textarea id="l-notes" rows="2" class="w-full p-2.5 text-sm resize-none" placeholder="اختياري"></textarea></div><div><input type="file" id="l-image" accept="image/*" class="hidden" onchange="handleImageSelect(event)"><button type="button" onclick="document.getElementById('l-image').click()" class="w-full border-2 border-dashed border-gray-200 rounded-xl p-3 text-gray-500 hover:border-teal-400">اختيار صورة</div><button type="submit" class="w-full bg-orange-500 text-white py-2.5 rounded-xl font-bold">إرسال</button></form>`; openModal(); };
        window.openOvertimeModal = () => { $('modal-content').innerHTML = `<div class="border-b pb-3 mb-3 flex justify-between items-center"><h3 class="font-bold text-lg">تسجيل وقت إضافي</h3><span onclick="closeModal()" class="text-gray-400 text-2xl">&times;</span></div><form id="overtime-form" class="space-y-3" onsubmit="submitOvertime(event)"><div><label class="text-xs block mb-1">التاريخ</label><input type="date" id="ot-date" class="w-full p-2.5" required></div><div><label class="text-xs block mb-1">عدد الساعات</label><input type="number" id="ot-hours" min="0.5" step="0.5" class="w-full p-2.5" required></div><button type="submit" class="w-full bg-indigo-500 text-white py-2.5 rounded-xl font-bold">إرسال</button></form>`; openModal(); };
        window.handleImageSelect = async (event) => { const file = event.target.files[0]; if (!file) return; try { compressedImageData = await compressImage(file); showToast("تم ضغط الصورة"); } catch (err) { showToast("فشل المعالجة", "error"); } };
        window.submitOvertime = async (e) => { e.preventDefault(); const dateVal = $('ot-date').value; const hours = parseFloat($('ot-hours').value); if (!dateVal || !hours) return; await addDoc(collection(db, `artifacts/${APP_ID}/public/data/overtime`), { employeeId: currentUser.id, employeeName: currentUser.displayName, date: new Date(dateVal), hours, status: 'Pending', createdAt: new Date() }); const mgrs = USERS_CONFIG.filter(u => u.role === 'manager'); for(let m of mgrs) { await createNotification(m.id, 'طلب وقت إضافي', `الموظف: ${currentUser.displayName}`, 'leaves'); } closeModal(); showToast("تم التسجيل"); };
        window.submitLeave = async (e) => { e.preventDefault(); let imageUrl = null; if (compressedImageData) { try { const storageRef = ref(storage, `leave_attachments/${Date.now()}.jpg`); await uploadString(storageRef, compressedImageData, 'data_url'); imageUrl = await getDownloadURL(storageRef); } catch(err) {} } await addDoc(collection(db, `artifacts/${APP_ID}/public/data/leaves`), { employeeId: currentUser.id, employeeName: currentUser.displayName, startDate: $('l-start').value, endDate: $('l-end').value, type: $('l-type').value, notes: $('l-notes').value, imageUrl, status: 'Pending', createdAt: new Date() }); const mgrs = USERS_CONFIG.filter(u => u.role === 'manager'); for(let m of mgrs) { await createNotification(m.id, 'طلب إجازة', `الموظف: ${currentUser.displayName}`, 'leaves'); } closeModal(); showToast("تم الإرسال"); };
        
        // --- Modal Controls ---
        window.openModal = () => { $('modal-container').classList.add('active'); document.body.style.overflow = 'hidden'; };
        window.closeModal = () => { $('modal-container').classList.remove('active'); document.body.style.overflow = ''; };
        window.openTaskModal = () => { $('mgr-task-desc').focus(); };
        
        // --- Login & Logout ---
        window.logoutUser = async () => { 
            await signOut(auth); 
            localStorage.removeItem('egybev_user'); 
            localStorage.removeItem('lastPage'); 
            // Reset UI
            currentUser = null; 
            hide('main-header'); 
            hide('dashboard-container'); 
            hide('fab-btn'); 
            hide('sidebar-panel'); 
            hide('sidebar-backdrop'); 
            show('login-section'); 
            document.body.classList.add('login-bg');
        };
        
        $('login-form').addEventListener('submit', (e) => { 
            e.preventDefault(); 
            const user = USERS_CONFIG.find(x => x.username === $('username').value && x.password === $('password').value); 
            if (user) { 
                currentUser = user; 
                localStorage.setItem('egybev_user', JSON.stringify(user)); 
                $('login-err').classList.add('hidden'); 
                initApp(); 
            } else { 
                $('login-err').classList.remove('hidden'); 
            } 
        });
        
        // --- Init App ---
        async function initApp() { 
            // 1. Check Local Storage First for UI state
            const storedUser = localStorage.getItem('egybev_user'); 
            
            if (storedUser) {
                currentUser = JSON.parse(storedUser);
                
                // 2. Initialize Firebase Auth
                onAuthStateChanged(auth, async (user) => { 
                    if (user) { 
                        fbUser = user; 
                        await syncUsers(); 
                        setupListeners(); 
                        
                        // 3. Show Dashboard
                        hide('login-section'); 
                        show('dashboard-container'); 
                        show('main-header'); 
                        document.body.classList.remove('login-bg');
                        
                        // 4. Restore Last Page or Default
                        const lastPage = localStorage.getItem('lastPage'); 
                        if (lastPage) {
                            navigateTo(lastPage); 
                        } else {
                            if (currentUser.role === 'manager') navigateTo('tasks'); 
                            else navigateTo('emp-balance'); 
                        }
                    } 
                    else { 
                        try { await signInAnonymously(auth); } 
                        catch(e) { console.error(e); } 
                    } 
                }); 
            } else {
                // No user found, ensure login screen is visible
                show('login-section');
                hide('dashboard-container');
                hide('main-header');
            }
        }
        
        function setupListeners() { 
            const basePath = `artifacts/${APP_ID}/public/data`; 
            onSnapshot(collection(db, `${basePath}/employees`), (snap) => { snap.forEach(d => employeesData[d.id] = d.data()); updateContent(); }); 
            onSnapshot(query(collection(db, `${basePath}/tasks`)), (snap) => { tasks = snap.docs.map(d => ({ id: d.id, ...d.data() })); updateContent(); }); 
            onSnapshot(query(collection(db, `${basePath}/leaves`)), (snap) => { leaves = snap.docs.map(d => ({ id: d.id, ...d.data() })); updateContent(); }); 
            onSnapshot(query(collection(db, `${basePath}/balance_logs`)), (snap) => { balanceLogs = snap.docs.map(d => ({ id: d.id, ...d.data() })); updateContent(); }); 
            onSnapshot(query(collection(db, `${basePath}/overtime`)), (snap) => { overtimeLogs = snap.docs.map(d => ({ id: d.id, ...d.data() })); updateContent(); });
            onSnapshot(query(collection(db, `${basePath}/notifications`)), (snap) => { notifications = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(n => n.userId === currentUser.id); notifications.sort((a,b) => b.date?.seconds - a.date?.seconds); updateNotifUI(); });
            onSnapshot(query(collection(db, `${basePath}/external_workers`)), (snap) => { externalWorkers = {}; snap.forEach(d => { externalWorkers[d.id] = d.data().count; }); updateContent(); });
            onSnapshot(query(collection(db, `${basePath}/daily_evaluations`), orderBy("createdAt", "desc")), (snap) => { dailyEvaluations = snap.docs.map(d => ({ id: d.id, ...d.data() })); updateContent(); });
        }
        
        initApp();
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed', err)); }); }
    </script>
</body>
</html>
